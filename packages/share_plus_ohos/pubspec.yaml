name: share_plus_ohos
description: 跨端分享插件，鸿蒙端使用系统分享 Ability，iOS/Android 端封装 share_plus。
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ohos:
        pluginClass: SharePlusOhosPlugin