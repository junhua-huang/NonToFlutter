name: reliable_websocket
description: 基于 Drift 的强壮 WebSocket 模块 —— 消息确认、有序交付、发件箱持久化、自动重连、与业务解耦。
version: 0.1.0
homepage: https://github.com/tai-chu/reliable_websocket

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  meta: ^1.9.1
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.0
  test: ^1.25.0
