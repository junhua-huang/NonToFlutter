name: video_player_ohos
description: 跨端视频播放器插件，鸿蒙端使用 AVPlayer+Texture，iOS/Android 端封装 video_player。
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # iOS/Android 端复用官方 video_player（成熟稳定）
  video_player: ^2.9.3
  video_player_android: ^2.9.3
  video_player_avfoundation: ^2.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ohos:
        pluginClass: VideoPlayerOhosPlugin